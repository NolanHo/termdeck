name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional tag name for creating a GitHub Release
        required: false
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build
      - run: pnpm pack --pack-destination artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: termdeck-package
          path: artifacts/*.tgz
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release create "${RELEASE_TAG}" artifacts/*.tgz --target "$GITHUB_SHA" --title "${RELEASE_TAG}" --notes "TermDeck ${RELEASE_TAG}"
